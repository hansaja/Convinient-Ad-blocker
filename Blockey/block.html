<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blockey Settings</title>
    <link rel="stylesheet" href="more.css">
</head>
<body>
    <div class="container">
        <h2>Blockey</h2>
        <div class="row">
            <div class="column left" id="col-left">
                <div class="button-container">
                    <a href="block.html"><button class="menu-buttons">Blocked Sites & Ad Domains</button></a>
                </div>
            </div>

            <div class="column right" id="col-right">
                <div class="right-container">
                    <h1>Blocked Sites & Ad Domains</h1>
                    <p>Enter one domain per line. Matching tabs will be automatically closed.</p>

                    <textarea id="textarea" rows="10" cols="30" spellcheck="false"></textarea>
                    <br>

                    <button id="save">Save</button>
                    <label><strong>Enabled?</strong> <input id="checkbox" type="checkbox"></label>
                </div>

                <script src="option.js"></script>
            </div>
        </div>
    </div>
</body>
</html>
