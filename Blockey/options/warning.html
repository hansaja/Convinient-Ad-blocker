<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Warning!</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f5f5f5;
    }
    .warning-box {
      text-align: center;
      max-width: 360px;
      padding: 32px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    h1 {
      color: #d9534f;
      margin-top: 0;
    }
    p {
      color: #555;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 10px 24px;
      margin: 0 6px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-continue {
      background-color: #f0ad4e;
      color: #fff;
    }
    .btn-continue:hover {
      background-color: #ec971f;
    }
    .btn-exit {
      background-color: #5cb85c;
      color: #fff;
    }
    .btn-exit:hover {
      background-color: #449d44;
    }
  </style>
</head>
<body>
  <div class="warning-box">
    <h1>Warning!</h1>
    <p>This site is not secure! It uses HTTP instead of HTTPS.</p>
    <button class="btn btn-exit" id="exit">Go Back</button>
    <button class="btn btn-continue" id="continue">Continue</button>
  </div>
  <script src="warning.js"></script>
</body>
</html>
